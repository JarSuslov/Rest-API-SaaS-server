version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: todosaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todosaas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todosaas-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=todosaas;Username=postgres;Password=postgres
      - Jwt__Key=SuperSecretKeyForProductionChangeMe_Min32Chars!!
      - Jwt__Issuer=TodoSaaS
      - Jwt__Audience=TodoSaaS
      - Jwt__ExpireHours=24

volumes:
  pgdata:
